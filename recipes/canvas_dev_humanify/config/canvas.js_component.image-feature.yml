langcode: en
status: true
dependencies:
  enforced:
    config:
      - canvas.js_component.logo
machineName: image-feature
name: "Image feature"
required:
  - image
  - title
  - description
props:
  image:
    type: object
    $ref: "json-schema-definitions://canvas.module/image"
    title: Image
    examples:
      - src: "https://placehold.co/1770x1180/png?text=Image+placeholder"
        alt: "Image feature placeholder"
        width: 1770
        height: 1180
  eyebrow:
    type: string
    title: Eyebrow
    examples:
      - "Human judgment, applied"
  title:
    type: string
    title: Title
    examples:
      - "We bring human strengths to AI-first teams."
  description:
    type: string
    contentMediaType: text/html
    x-formatting-context: block
    title: Description
    examples:
      - "<p>We partner with AI-native teams to add what machines still struggle
        to replicate: taste, narrative coherence, emotional resonance, and
        domain-informed judgment.</p>"
slots: {}
